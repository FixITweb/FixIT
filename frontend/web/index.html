<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="frontend">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>frontend</title>
  <link rel="manifest" href="manifest.json">

  <meta name="flutter-web-renderer" content="html">

  <script>
    // 🚨 DEBUG SCRIPT: Catch silent crashes and display them on screen
    window.onerror = function(message, source, lineno, colno, error) {
      const div = document.createElement('div');
      div.style.position = 'fixed';
      div.style.top = '0';
      div.style.left = '0';
      div.style.width = '100%';
      div.style.height = '100%';
      div.style.backgroundColor = 'white';
      div.style.color = 'red';
      div.style.padding = '20px';
      div.style.zIndex = '999999';
      div.style.fontFamily = 'monospace';
      div.style.overflow = 'auto';
      div.innerHTML = '<h1>FixIT App Crash detected:</h1><pre>' + 
                      'Message: ' + message + '\n\n' + 
                      'Source: ' + source + '\n\n' + 
                      'Line: ' + lineno + '\n\n' + 
                      'Stack: ' + (error ? error.stack : 'N/A') + 
                      '</pre><p>Check the console for more details.</p>';
      document.body.appendChild(div);
    };
  </script>
</head>
<body>
  <script>
    // Modern way to force HTML renderer without triggering legacy assertion
    window.flutterWebRenderer = "html";
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
