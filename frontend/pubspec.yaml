name: frontend
description: "FixIT - Smart Local Service Marketplace"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Network
  dio: ^5.3.3
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # UI
  cupertino_icons: ^1.0.2
  
  # Maps
  google_maps_flutter: ^2.5.0
  google_maps_flutter_web: ^0.5.4+2
  
  # Location
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # URL Launcher (for navigation)
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
